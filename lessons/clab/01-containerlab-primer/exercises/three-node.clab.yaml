# Lesson 1 Exercise 2: Three node topology
# Three SR Linux nodes connected sequentially

name: three-lab

topology:
  nodes:
    # First SR Linux node
    srl1:
      kind: srl
      image: ghcr.io/nokia/srlinux:24.10.1

    # Second SR Linux node
    srl2:
      kind: srl
      image: ghcr.io/nokia/srlinux:24.10.1

    # Third SR Linux node
    srl3:
      kind: srl
      image: ghcr.io/nokia/srlinux:24.10.1

  links:
    # Connect srl1's ethernet-1/1 to srl2's ethernet-1/1
    - endpoints: ["srl1:e1-1", "srl2:e1-1"]
    # Connect srl2's ethernet-1/2 to srl3's ethernet-1/2
    - endpoints: ["srl2:e1-2", "srl3:e1-2"]
